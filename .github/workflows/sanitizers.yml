name: Sanitizers

on:
  workflow_dispatch:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: false
        default: '8.5'
  schedule:
    # Run sanitizers nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  asan-ubsan:
    name: ASan + UBSan Tests (PHP ${{ github.event.inputs.php-version || '8.5' }})
    runs-on: ubuntu-latest

    env:
      CC: clang
      CXX: clang++
      CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -g
      CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -g
      LDFLAGS: -fsanitize=address,undefined
      ASAN_OPTIONS: detect_leaks=0:fast_unwind_on_malloc=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php-version || '8.5' }}
          extensions: json
          tools: composer

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential php${{ github.event.inputs.php-version || '8.5' }}-dev autoconf clang

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure CMake with sanitizers
        run: |
          cmake -B build \
            -DBUILD_TESTS=ON \
            -DBUILD_PHP=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSNOBOL_SANITIZE=ON

      - name: Build C library
        run: cmake --build build

      - name: Run C tests with ASan/UBSan
        working-directory: build
        run: cmake --build . --target test-asan
        continue-on-error: false

      - name: Check for sanitizer errors
        run: |
          echo "## Sanitizer Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PHP Version:** ${{ github.event.inputs.php-version || '8.5' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Sanitizers:** AddressSanitizer + UndefinedBehaviorSanitizer" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If tests passed, no memory safety issues were detected." >> $GITHUB_STEP_SUMMARY
