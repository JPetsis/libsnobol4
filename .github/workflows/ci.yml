name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          tools: composer

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential php${{ matrix.php-version }}-dev autoconf

      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer dump-autoload -o

      - name: "Quick sanity check: repo files"
        run: |
          ls -la
          ls -la core | head -50
          ls -la bindings/php 2>/dev/null || echo "PHP bindings directory checked"
          php -r "echo 'PWD=' . getcwd() . PHP_EOL;"

      - name: Debug Composer autoload mapping (Snobol\\)
        run: |
          php -r "require 'vendor/autoload.php'; echo 'autoload-required' . PHP_EOL;"
          php -r "require 'vendor/autoload.php'; var_export(require 'vendor/composer/autoload_psr4.php');" | head -200
          php -r "require 'vendor/autoload.php'; var_dump(class_exists('Snobol\\\\Builder'));"

      - name: Build C extension
        working-directory: core
        run: |
          phpize
          ./configure --enable-snobol
          make
          sudo make install

      - name: Enable extension
        shell: bash
        run: |
          set -euo pipefail

          LOADED_INI=$(php -r 'echo php_ini_loaded_file() ?: "";')
          echo "Loaded php.ini: ${LOADED_INI:-<none>}"

          if [ -n "${PHP_INI_SCAN_DIR:-}" ] && [ -d "$PHP_INI_SCAN_DIR" ]; then
            INI_DIR="$PHP_INI_SCAN_DIR"
            echo "Using PHP_INI_SCAN_DIR: $INI_DIR"
            echo "extension=snobol.so" | sudo tee "$INI_DIR/99-snobol.ini" > /dev/null
          else
            if [ -n "$LOADED_INI" ]; then
              BASE_DIR=$(dirname "$LOADED_INI")
              if [ -d "$BASE_DIR/conf.d" ]; then
                INI_DIR="$BASE_DIR/conf.d"
                echo "Using conf.d next to loaded ini: $INI_DIR"
                echo "extension=snobol.so" | sudo tee "$INI_DIR/99-snobol.ini" > /dev/null
              else
                echo "Appending extension to loaded ini: $LOADED_INI"
                echo "extension=snobol.so" | sudo tee -a "$LOADED_INI" > /dev/null
              fi
            else
              echo "Could not determine php.ini location; failing" >&2
              exit 1
            fi
          fi

          echo "=== PHP --ini ==="
          php --ini | cat

          echo "=== Verify extension loaded ==="
          php -m | grep -i '^snobol$'
          php -r "if (!extension_loaded('snobol')) { fwrite(STDERR, 'Extension not loaded\n'); exit(1);}"

      - name: Verify Composer autoload (Snobol\\Builder)
        run: php -r "require 'vendor/autoload.php'; if (!class_exists('Snobol\\Builder')) { fwrite(STDERR, 'Snobol\\Builder not autoloadable\n'); exit(1);}"

      - name: Run C tests
        working-directory: tests/c
        run: make test
        continue-on-error: true
        env:
          ASAN_OPTIONS: detect_leaks=0

      - name: Run PHP tests
        run: php vendor/bin/phpunit tests/php

      - name: Verify extension loaded
        run: php -r "if (!extension_loaded('snobol')) exit(1);"
