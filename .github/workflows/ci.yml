name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4', '8.5' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          tools: composer

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential php${{ matrix.php-version }}-dev autoconf

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build C extension
        working-directory: snobol4-php
        run: |
          phpize
          ./configure --enable-snobol
          make
          sudo make install

      - name: Enable extension
        run: |
          # Try to find the correct ini directory
          SCAN_DIR=$(php -r "echo ini_get('cfg_file_path') ?: php_ini_scanned_dir();")
          if [ -z "$SCAN_DIR" ] || [ "$SCAN_DIR" = "false" ]; then
            INI_FILE=$(php -r "echo php_ini_loaded_file();")
            INI_DIR=$(dirname "$INI_FILE")
            echo "Using main ini directory: $INI_DIR"
            echo "extension=snobol.so" | sudo tee -a "$INI_FILE"
          else
            echo "Using scanned directory: $SCAN_DIR"
            echo "extension=snobol.so" | sudo tee "$SCAN_DIR/99-snobol.ini"
          fi
          # Verify extension loaded
          php -m | grep snobol || (echo "Extension not loaded!" && exit 1)
          php -r "if (!extension_loaded('snobol')) { echo 'Extension not loaded!\n'; exit(1); } else { echo 'Extension loaded successfully\n'; }"

      - name: Regenerate autoloader
        run: composer dump-autoload

      - name: Verify setup
        run: |
          echo "=== PHP Info ==="
          php -v
          echo "=== Loaded Extensions ==="
          php -m
          echo "=== Composer Autoload Check ==="
          php -r "require 'vendor/autoload.php'; var_dump(class_exists('Snobol\\Builder'));"

      - name: Run C tests
        working-directory: tests/c
        run: make test
        continue-on-error: true

      - name: Run PHP tests
        run: php vendor/bin/phpunit tests/php

      - name: Verify extension loaded
        run: php -r "if (!extension_loaded('snobol')) exit(1);"
