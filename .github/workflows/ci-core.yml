name: CI - Core Library

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'tests/c/**'
      - 'CMakeLists.txt'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/ci-php.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'tests/c/**'
      - 'CMakeLists.txt'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/ci-php.yml'

jobs:
  core-tests:
    name: Core C Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Configure CMake
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PHP=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        if: matrix.os != 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure

      - name: Run Tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -C Release --verbose

  jit-backend-tests:
    name: JIT Backend Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # ARM64 runners: macOS Apple Silicon + Linux AArch64 (native)
        os: [ macos-latest, ubuntu-24.04-arm ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake (with JIT backend)
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PHP=OFF -DSNOBOL_JIT_BACKEND=arm64

      - name: Build
        run: cmake --build build --config Release

      - name: Run JIT IR unit tests
        working-directory: build
        run: ctest --output-on-failure -L jit-ir

      - name: Run IR roundtrip tests
        working-directory: build
        run: ctest --output-on-failure -L roundtrip

      - name: Run full JIT test suite
        working-directory: build
        run: ctest --output-on-failure

  jit-qemu-aarch64:
    name: JIT QEMU AArch64 (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and test in QEMU AArch64 container
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          file: ci/Dockerfile.jit-qemu

