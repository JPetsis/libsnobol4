name: CI - Core Library

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'tests/c/**'
      - 'CMakeLists.txt'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/ci-php.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'core/**'
      - 'tests/c/**'
      - 'CMakeLists.txt'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-core.yml'
      - '.github/workflows/ci-php.yml'

jobs:
  core-tests:
    name: Core C Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    env:
      SNOBOL_JIT_LOG_FILE: snobol-jit-core-${{ matrix.os }}.log
      SNOBOL_TEST_TIMEOUT_SECS: "60"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Configure CMake
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PHP=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        if: matrix.os != 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure

      - name: Run Tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -C Release --verbose

      - name: Upload JIT log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-log-core-${{ matrix.os }}
          path: |
            build/${{ env.SNOBOL_JIT_LOG_FILE }}
            build/watchdog.log
          if-no-files-found: ignore
          retention-days: 7

  jit-backend-tests:
    name: JIT Backend Tests (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ARM64: macOS Apple Silicon + Linux AArch64
          - os: macos-latest
            backend: arm64
          - os: ubuntu-24.04-arm
            backend: arm64
          # x86-64: Linux + Windows + macOS Intel
          - os: ubuntu-latest
            backend: x86_64
          - os: windows-latest
            backend: x86_64
          - os: macos-13
            backend: x86_64

    env:
      # Capture every JIT/VM event to a file so a CI hang can be diagnosed
      # post-mortem by inspecting the last few hundred lines of the log.
      # CTest runs in build/, so the log is created in build/ alongside the
      # test binary; the upload step globs both the working dir and build/.
      SNOBOL_JIT_LOG_FILE: snobol-jit-${{ matrix.os }}-${{ matrix.backend }}.log
      # Per-suite watchdog.  Aborts the test binary if a suite runs longer
      # than this; default 60 s.
      SNOBOL_TEST_TIMEOUT_SECS: "60"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Configure CMake (with JIT backend)
        run: cmake -B build -DBUILD_TESTS=ON -DBUILD_PHP=OFF -DSNOBOL_JIT_BACKEND=${{ matrix.backend }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run JIT IR unit tests
        if: matrix.os != 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -L jit-ir

      - name: Run IR roundtrip tests
        if: matrix.os != 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -L roundtrip

      - name: Run full JIT test suite
        if: matrix.os != 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure

      - name: Run JIT IR unit tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -L jit-ir -C Release --verbose

      - name: Run IR roundtrip tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -L roundtrip -C Release --verbose

      - name: Run full JIT test suite (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: build
        run: ctest --output-on-failure -C Release --verbose

      - name: Upload JIT log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-log-${{ matrix.os }}-${{ matrix.backend }}
          path: |
            build/${{ env.SNOBOL_JIT_LOG_FILE }}
            build/watchdog.log
          if-no-files-found: ignore
          retention-days: 7

  jit-qemu-aarch64:
    name: JIT QEMU AArch64 (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and test in QEMU AArch64 container
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          file: ci/Dockerfile.jit-qemu

  jit-qemu-armv7:
    name: JIT QEMU ARMv7 (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build and test in QEMU ARMv7 container
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          push: false
          file: ci/Dockerfile.jit-qemu-armv7

  jit-qemu-riscv64:
    name: JIT QEMU RISC-V 64 (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Build and test in QEMU RISC-V 64 container
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/riscv64
          push: false
          file: ci/Dockerfile.jit-qemu-riscv64

