name: CI - PHP Binding

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'bindings/php/**'
      - 'bindings/php/composer.json'
      - 'bindings/php/composer.lock'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-php.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'bindings/php/**'
      - 'bindings/php/composer.json'
      - 'bindings/php/composer.lock'
      - 'dev/generate_amalgam.sh'
      - '.github/workflows/ci-php.yml'

jobs:
  php-tests:
    name: PHP ${{ matrix.php-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        php-version: [ '8.3', '8.4', '8.5' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json
          tools: composer
          coverage: none

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Ubuntu noble's default repos do not ship php8.4-dev.
          # shivammathur/setup-php may have already added ppa:ondrej/php
          # with an inline key, which conflicts with add-apt-repository's
          # keyring format.  Remove any pre-existing ondrej source files
          # before adding the PPA cleanly.
          sudo apt-get update
          sudo apt-get install -y cmake build-essential autoconf software-properties-common
          sudo rm -f /etc/apt/sources.list.d/ondrej-php* /etc/apt/sources.list.d/*ondrej*
          sudo add-apt-repository --no-update -y ppa:ondrej/php
          sudo apt-get update
          sudo apt-get install -y php${{ matrix.php-version }}-dev php${{ matrix.php-version }}-cli
          which php-config

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake autoconf
          # Handle PHP installation - may already exist from different tap
          if brew list --versions php@${{ matrix.php-version }} >/dev/null 2>&1; then
            echo "PHP ${{ matrix.php-version }} already installed"
            brew link php@${{ matrix.php-version }} --force || true
          else
            brew install php@${{ matrix.php-version }} || brew link php@${{ matrix.php-version }} --force || true
          fi
          which php-config || echo "php-config not found, checking alternatives"
          ls /usr/local/bin/php-config* 2>/dev/null || ls /opt/homebrew/bin/php-config* 2>/dev/null || true

      - name: Install Composer dependencies
        working-directory: bindings/php
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer dump-autoload -o

      - name: Verify core amalgamation is up to date
        run: |
          ./dev/generate_amalgam.sh verify

      - name: Build PHP extension with phpize
        working-directory: bindings/php
        run: |
          phpize
          # Use =shared to explicitly tell phpize to define COMPILE_DL_SNOBOL
          ./configure --enable-snobol=shared
          make clean
          make
          echo "Extension built at: $(find . -name 'snobol.so' -type f)"
          # Verify get_module is exported (required by PHP to load the extension)
          BUILT_SO=$(find . -name 'snobol.so' -not -path './.libs/*' -type f | head -1)
          if [ -z "$BUILT_SO" ]; then
            BUILT_SO=$(find . -name 'snobol.so' -type f | head -1)
          fi
          if [ -n "$BUILT_SO" ]; then
            echo "=== Built extension: $BUILT_SO ==="
            file "$BUILT_SO" || true
            nm "$BUILT_SO" 2>/dev/null | grep -i get_module \
              && echo "OK: get_module symbol found" \
              || echo "WARNING: get_module NOT found in $BUILT_SO"
          else
            echo "WARNING: snobol.so not found after make"
          fi
          sudo make install
          EXT_DIR=$(php -r 'echo ini_get("extension_dir");')
          echo "Extension installed to: $EXT_DIR"
          ls -la "$EXT_DIR" | grep snobol || echo "Extension not found in extension_dir"
          if [ -f "$EXT_DIR/snobol.so" ]; then
            nm "$EXT_DIR/snobol.so" 2>/dev/null | grep -i get_module \
              && echo "OK: get_module in installed extension" \
              || echo "WARNING: get_module NOT in installed $EXT_DIR/snobol.so"
          fi

      - name: Enable extension
        shell: bash
        run: |
          set -euo pipefail

          # setup-php sets PHP_INI_SCAN_DIR; use it when available
          if [ -n "${PHP_INI_SCAN_DIR:-}" ] && [ -d "$PHP_INI_SCAN_DIR" ]; then
            INI_DIR="$PHP_INI_SCAN_DIR"
            echo "Using PHP_INI_SCAN_DIR: $INI_DIR"
          else
            LOADED_INI=$(php -r 'echo php_ini_loaded_file() ?: "";')
            echo "Loaded php.ini: ${LOADED_INI:-<none>}"
            if [ -n "$LOADED_INI" ]; then
              BASE_DIR=$(dirname "$LOADED_INI")
              if [ -d "$BASE_DIR/conf.d" ]; then
                INI_DIR="$BASE_DIR/conf.d"
                echo "Using conf.d: $INI_DIR"
              else
                echo "Appending extension line to $LOADED_INI"
                echo "extension=snobol.so" | sudo tee -a "$LOADED_INI" > /dev/null
                INI_DIR=""
              fi
            else
              echo "Cannot locate php.ini; aborting" >&2; exit 1
            fi
          fi

          if [ -n "${INI_DIR:-}" ]; then
            sudo mkdir -p "$INI_DIR"
            echo "extension=snobol.so" | sudo tee "$INI_DIR/99-snobol.ini" > /dev/null
            echo "Wrote $INI_DIR/99-snobol.ini"
          fi

          echo "=== php --ini ==="
          php --ini | cat
          echo "=== Verify extension loaded ==="
          php -m | grep -i '^snobol$'
          php -r "if (!extension_loaded('snobol')) { fwrite(STDERR, 'Extension not loaded\n'); exit(1); }"

      - name: Run PHP tests
        working-directory: bindings/php
        run: |
          # Print PHP + extension info for diagnostics
          php -r "echo 'PHP: ' . PHP_VERSION . PHP_EOL . 'Arch: ' . php_uname('m') . PHP_EOL;"
          php -r "if (extension_loaded('snobol')) { echo 'snobol extension loaded' . PHP_EOL; } else { echo 'snobol NOT loaded' . PHP_EOL; }"
          # Run each test file individually so that when a bus error kills the
          # process we know exactly which class was running.  Each invocation
          # prints the filename before phpunit starts so it is visible even if
          # the process is hard-killed mid-test.
          FAILED=0
          for f in $(find tests/php -name '*Test.php' | sort); do
            echo ""
            echo "====== Running: $f ======"
            vendor/bin/phpunit "$f" --testdox 2>&1 || {
              EXIT=$?
              echo "--- $f exited with code $EXIT ---"
              if [ $EXIT -eq 138 ]; then
                echo "Exit 138 = SIGBUS (signal 10) on Apple Silicon — bus error in $f"
              fi
              FAILED=$EXIT
            }
          done
          exit $FAILED

  php-windows:
    name: PHP ${{ matrix.php-version }} (Windows)
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.3', '8.4', '8.5' ]

    env:
      # Where the PHP SDK binary tools (phpize / buildconf / configure / nmake) live.
      PHP_SDK_BINARY_TOOLS_PATH: ${{ github.workspace }}\php-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none
          # The PHP SDK needs the MSVC toolchain to drive nmake.
          compiler: vs2022

      - name: Install Composer dependencies
        working-directory: bindings/php
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Download PHP SDK and dev pack
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # PHP SDK binary tools — provides phpsdk, phpsdk_setvars.bat,
          # buildconf and the MSVC/nmake environment used to drive the build.
          $sdkUrl = "https://github.com/php/php-sdk-binary-tools/archive/refs/heads/master.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile sdk.zip
          Expand-Archive sdk.zip -DestinationPath .
          Rename-Item php-sdk-binary-tools-master php-sdk

          # Dev pack: headers, import lib (dev/php.lib), phpize.bat/configure.bat.
          # It MUST match the exact PHP version + ts/nts + VS toolset + arch of
          # the PHP that setup-php installed, otherwise the built .dll will not
          # load (ABI mismatch). The "-vsXX" segment in the dev pack name only
          # records which VS built that PHP release; the headers/lib themselves
          # are toolset-agnostic, so we always BUILD with vs17 (the VS2022
          # toolset that is guaranteed present on windows-latest).
          $phpVer = (php -r "echo PHP_VERSION;")
          $ts = (php -r "echo ZEND_THREAD_SAFE ? '' : 'nts-';")
          $mm = ($phpVer -split '\.')[0..1] -join '.'
          $vsPack = @{'8.0'='vs16';'8.1'='vs16';'8.2'='vs16';'8.3'='vs16';'8.4'='vs17';'8.5'='vs17'}[$mm]
          if (-not $vsPack) { $vsPack = 'vs16' }

          $develName = "php-devel-pack-$phpVer-$($ts)Win32-$vsPack-x64.zip"
          $develUrl = "https://windows.php.net/downloads/releases/$develName"
          echo "Building against PHP $phpVer (ts flag: '$ts', devel pack toolset: $vsPack)"
          echo "Downloading dev pack: $develUrl"
          Invoke-WebRequest -Uri $develUrl -OutFile devel.zip
          Expand-Archive devel.zip -DestinationPath php-dev

          # The devel pack extracts into a single top-level folder; locate
          # phpize.bat and export its directory so the build step can use it.
          $phpize = (Get-ChildItem php-dev -Recurse -Filter phpize.bat | Select-Object -First 1).FullName
          if (-not $phpize) { throw "phpize.bat not found in dev pack" }
          $phpDev = Split-Path $phpize
          echo "PHP_DEV=$phpDev" >> $env:GITHUB_ENV

          # Build toolset: always vs17 (VS2022), present on windows-latest.
          echo "VS=vs17" >> $env:GITHUB_ENV

          # Capture the setup-php PHP install dir so 'php' is the correct
          # version when the devel pack's phpize.bat invokes it.
          $phpBin = Split-Path (Get-Command php.exe).Source
          echo "PHP_BIN_DIR=$phpBin" >> $env:GITHUB_ENV
          echo "phpize.bat at: $phpize"
          echo "php.exe at:    $phpBin"

      - name: Build extension (phpize + nmake)
        shell: cmd
        run: |
          @echo on
          REM The PHP SDK starter (phpsdk-<toolset>-x64.bat) sets up the VS +
          REM SDK build environment and, with -t, runs the given task inside
          REM that environment and then exits. Without -t it opens an
          REM interactive shell, which would hang CI.
          REM
          REM Write the build task to a .bat, then hand it to the starter.
          (
            echo @echo on
            echo set "PATH=%PHP_DEV%;%PHP_BIN_DIR%;%PHP_SDK_BINARY_TOOLS_PATH%\bin;%%PATH%%"
            echo cd /d %GITHUB_WORKSPACE%\bindings\php
            echo call phpize.bat
            echo if errorlevel 1 exit /b 1
            echo call configure.bat --enable-snobol=shared
            echo if errorlevel 1 exit /b 1
            echo nmake
            echo if errorlevel 1 exit /b 1
            echo REM DLL may be in a subdirectory (x64/Release_NTS, Release_NTS, etc.)
            echo for /r %%d in (php_snobol.dll) do @if exist "%%d" copy /Y "%%d" .
            echo dir *.dll
            echo if not exist php_snobol.dll exit /b 1
          ) > build_task.bat

          call "%PHP_SDK_BINARY_TOOLS_PATH%\phpsdk-%VS%-x64.bat" -t build_task.bat

      - name: Install and enable extension
        shell: cmd
        run: |
          set PATH=%PHP_BIN_DIR%;%PATH%
          cd bindings\php
          REM DLL may be in a subdirectory (x64/Release_NTS, Release_NTS, etc.)
          if not exist php_snobol.dll (
            for /r %%d in (php_snobol.dll) do @if exist "%%d" copy /Y "%%d" .
          )
          set "DLL=%CD%\php_snobol.dll"
          if not exist "%DLL%" (
            echo ERROR: php_snobol.dll was not built
            echo Searching for any DLL output:
            dir /s /b *.dll 2>nul || echo No DLLs found
            exit /b 1
          )
          for /f "usebackq delims=" %%i in (`php -r "echo ini_get('extension_dir');"`) do set "EXT_DIR=%%i"
          echo "PHP extension_dir: %EXT_DIR%"
          copy /Y "%DLL%" "%EXT_DIR%\"

          REM Enable via the php.ini scan dir (setup-php sets PHP_INI_SCAN_DIR).
          if defined PHP_INI_SCAN_DIR (
            if not exist "%PHP_INI_SCAN_DIR%" mkdir "%PHP_INI_SCAN_DIR%"
            echo extension=snobol > "%PHP_INI_SCAN_DIR%\99-snobol.ini"
          ) else (
            php -r "file_put_contents(php_ini_loaded_file(), PHP_EOL . 'extension=snobol', FILE_APPEND);"
          )
          php -m | findstr /i snobol && echo "snobol extension loaded"

      - name: Run PHP tests
        working-directory: bindings/php
        shell: bash
        run: |
          php -r "echo 'PHP: ' . PHP_VERSION . PHP_EOL;"
          php -r "if (extension_loaded('snobol')) { echo 'snobol extension loaded' . PHP_EOL; } else { echo 'snobol NOT loaded' . PHP_EOL; exit(1); }"
          FAILED=0
          for f in $(find tests/php -name '*Test.php' | sort); do
            echo "====== Running: $f ======"
            php vendor/bin/phpunit "$f" --testdox 2>&1 || FAILED=$?
          done
          exit $FAILED
