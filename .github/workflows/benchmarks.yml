name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: false
        default: '8.4'
      base_ref:
        description: 'Base branch/ref for comparison (optional)'
        required: false
        default: 'main'
jobs:
  benchmarks:
    name: Run Benchmarks (PHP ${{ github.event.inputs.php-version || '8.4' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ github.event.inputs.php-version || '8.4' }}
          extensions: json
          tools: composer

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf software-properties-common
          sudo rm -f /etc/apt/sources.list.d/ondrej-php* /etc/apt/sources.list.d/*ondrej*
          sudo add-apt-repository --no-update -y ppa:ondrej/php
          sudo apt-get update
          sudo apt-get install -y php${{ github.event.inputs.php-version || '8.4' }}-dev || \
            echo "php${{ github.event.inputs.php-version || '8.4' }}-dev not available; relying on setup-php for phpize"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build C extension
        working-directory: bindings/php
        run: |
          phpize
          ./configure --enable-snobol
          make
          sudo make install

      - name: Enable extension
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${PHP_INI_SCAN_DIR:-}" ] && [ -d "$PHP_INI_SCAN_DIR" ]; then
            INI_DIR="$PHP_INI_SCAN_DIR"
          else
            LOADED_INI=$(php -r 'echo php_ini_loaded_file() ?: "";')
            if [ -n "$LOADED_INI" ]; then
              BASE_DIR=$(dirname "$LOADED_INI")
              if [ -d "$BASE_DIR/conf.d" ]; then
                INI_DIR="$BASE_DIR/conf.d"
              else
                echo "extension=snobol.so" | sudo tee -a "$LOADED_INI" > /dev/null
                INI_DIR=""
              fi
            else
              echo "Cannot locate php.ini; aborting" >&2; exit 1
            fi
          fi
          if [ -n "${INI_DIR:-}" ]; then
            sudo mkdir -p "$INI_DIR"
            echo "extension=snobol.so" | sudo tee "$INI_DIR/99-snobol.ini" > /dev/null
          fi
          php -m | grep snobol

      - name: Run all benchmarks
        run: php bench/run_all.php

      - name: Generate summary
        run: |
          echo "## Benchmark Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PHP Version:** ${{ github.event.inputs.php-version || '8.4' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Base ref:** ${{ github.event.inputs.base_ref || 'main' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Benchmark results have been uploaded as artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-php-${{ github.event.inputs.php-version || '8.4' }}
          path: |
            bench/results_*.json
          retention-days: 30
