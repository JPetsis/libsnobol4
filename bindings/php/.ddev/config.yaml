name: libsnobol4-php
type: php
docroot: public
php_version: "8.5"
webserver_type: nginx-fpm
xdebug_enabled: false
additional_hostnames: [ ]
additional_fqdns: [ ]
database:
  type: mariadb
  version: "10.11"
use_dns_when_possible: true
composer_version: "2"
web_environment: [ ]
corepack_enable: false
disable_upload_dirs_warning: true
hooks:
  post-start:
    - exec: |
        set -euo pipefail
        echo "🔨 Building libsnobol4 PHP extension..."
        
        # Check for config.m4
        if [ ! -f "/var/www/html/config.m4" ]; then
          echo "❌ config.m4 not found"
          echo "   Make sure you're running DDEV from bindings/php directory"
          exit 0
        fi
        
        # Check if core is mounted (via docker-compose.local.yaml)
        if [ -d "/var/www/core/src" ]; then
          echo "✓ Core directory found (mounted)"
          CORE_DIR="/var/www/core"
        elif [ -d "/var/www/html/../core" ]; then
          echo "✓ Core directory found (relative)"
          CORE_DIR="/var/www/html/../core"
        else
          echo "❌ Core directory not found!"
          echo ""
          echo "Setup instructions:"
          echo "1. Copy .ddev/docker-compose.core.yaml.example to .ddev/docker-compose.local.yaml"
          echo "2. Edit docker-compose.local.yaml and update paths for your system"
          echo "3. Run 'ddev restart'"
          echo ""
          echo "Skipping extension build."
          exit 0
        fi
        
        # Build the extension in /tmp
        sudo rm -rf /tmp/snobol_build
        mkdir -p /tmp/snobol_build
        cp -r /var/www/html/* /tmp/snobol_build/
        cp -r "$CORE_DIR" /tmp/snobol_build/core
        
        cd /tmp/snobol_build
          
          # Locate phpize/php-config for the runtime PHP version.
          # Strategy: resolve the actual PHP binary (e.g. /usr/bin/php8.5) and
          # look for phpize/php-config with the same version suffix in the same
          # directory.  This is reliable regardless of update-alternatives state.
          PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION . "." . PHP_MINOR_VERSION;')
          PHP_BIN=$(readlink -f "$(command -v php)" 2>/dev/null || command -v php)
          PHP_BINDIR="$(dirname "$PHP_BIN")"
          PHP_VERSUFFIX="${PHP_BIN##*/php}"   # "8.5" if binary is php8.5, "" otherwise
          
          # Dynamic fallback: install php-dev for the runtime PHP version if missing.
          # The Dockerfile pre-installs this at image-build time as a fast path;
          # this ensures correctness even when the image layer is stale or the
          # build-time apt cache was outdated.
          if [ ! -x "${PHP_BINDIR}/phpize${PHP_VER}" ]; then
            echo "📦 phpize${PHP_VER} not found – installing php${PHP_VER}-dev..."
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends "php${PHP_VER}-dev"
          fi
          
          PHPIZE_BIN=""
          PHP_CONFIG_BIN=""
          for VSUFFIX in "$PHP_VER" "$PHP_VERSUFFIX" ""; do
            if [ -x "${PHP_BINDIR}/phpize${VSUFFIX}" ]; then
              PHPIZE_BIN="${PHP_BINDIR}/phpize${VSUFFIX}"
              PHP_CONFIG_BIN="${PHP_BINDIR}/php-config${VSUFFIX}"
              break
            fi
          done
          
          if [ -z "$PHPIZE_BIN" ]; then
            echo "❌ Cannot find phpize for PHP $PHP_VER (looked in $PHP_BINDIR)"
            exit 1
          fi
          echo "Using phpize:     $PHPIZE_BIN"
          echo "Using php-config: $PHP_CONFIG_BIN"
          
          "$PHPIZE_BIN"
          ./configure --enable-snobol --with-php-config="$PHP_CONFIG_BIN"
        make -j"$(nproc)"
          
          # Copy .so directly to the runtime PHP's extension_dir.
          # This avoids API-hash mismatches when the phpize binary and the
          # runtime PHP come from different versions (e.g. phpize→8.4 but
          # runtime→8.5 which changed the hash from 20240924 to 20250925).
          EXT_DIR=$(php -r 'echo ini_get("extension_dir");')
          echo "PHP extension dir: $EXT_DIR"
          sudo mkdir -p "$EXT_DIR"
          BUILT_SO=$(find /tmp/snobol_build -name 'snobol.so' \
            \( -path '*/modules/*' -o -path '*/.libs/*' \) -type f | head -1)
          [ -z "$BUILT_SO" ] && BUILT_SO=$(find /tmp/snobol_build -name 'snobol.so' -type f | head -1)
          echo "Installing: $BUILT_SO → $EXT_DIR/snobol.so"
          sudo cp "$BUILT_SO" "$EXT_DIR/snobol.so"
          
          # Enable the extension – use PHP_CONFIG_FILE_SCAN_DIR (compile-time
          # constant) which is always correct, no fragile text parsing needed.
          PHP_SCAN_DIR=$(php -r 'echo PHP_CONFIG_FILE_SCAN_DIR;' 2>/dev/null || true)
          echo "PHP scan dir: '$PHP_SCAN_DIR'"
          PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION . "." . PHP_MINOR_VERSION;')
          
          if [ -n "$PHP_SCAN_DIR" ]; then
            sudo mkdir -p "$PHP_SCAN_DIR"
            echo "extension=snobol.so" | sudo tee "$PHP_SCAN_DIR/20-snobol.ini" > /dev/null
            echo "INI written to $PHP_SCAN_DIR/20-snobol.ini"
          else
            # Fallback: well-known DDEV/Ondrej-PPA path
            CLI_CONFD="/etc/php/${PHP_VER}/cli/conf.d"
            sudo mkdir -p "$CLI_CONFD"
            echo "extension=snobol.so" | sudo tee "$CLI_CONFD/20-snobol.ini" > /dev/null
            echo "INI written to $CLI_CONFD/20-snobol.ini (fallback)"
          fi
          
          # Also enable for FPM if its conf.d exists
          FPM_CONFD="/etc/php/${PHP_VER}/fpm/conf.d"
          if [ -d "$FPM_CONFD" ]; then
            echo "extension=snobol.so" | sudo tee "$FPM_CONFD/20-snobol.ini" > /dev/null
          fi
        
        # Cleanup
        sudo rm -rf /tmp/snobol_build
          
          # Verify installation – use exact line match and suppress startup warnings
          # so that "snobol: Unable to initialize module" doesn't produce false positives.
          if php -m 2>/dev/null | grep -qx "snobol"; then
          echo "✅ libsnobol4 PHP extension installed successfully!"
        else
          echo "❌ Failed to enable snobol extension"
            php -m 2>&1 | grep -i snobol || true
          exit 1
        fi
