name: libsnobol4-php
type: php
docroot: public
php_version: "8.5"
webserver_type: nginx-fpm
additional_hostnames: [ ]
additional_fqdns: [ ]
database:
  type: mariadb
  version: "10.11"
use_dns_when_possible: true
composer_version: "2"
web_environment: [ ]
corepack_enable: false
disable_upload_dirs_warning: true
hooks:
  post-start:
    # Delegate entirely to the canonical build command so there is only one
    # build code path.  Use ddev build-snobol-extension for manual rebuilds
    # without restarting the container.
    - exec: bash /var/www/html/.ddev/commands/web/build-snobol-extension
